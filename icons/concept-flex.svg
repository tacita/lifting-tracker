    <!-- Upper arm -->
    <path d="M-20,-80 L-50,-30 L-80,40 L-60,50 L-30,0 L0,60 L40,100 L80,110 L100,90 L70,70 L50,30 L30,-10 L20,-60 L10,-80 Z"
          fill="#45e6a0" stroke="none"/>
