<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0b0c10"/>
  <!-- Dumbbell - bold angular style, tilted slightly -->
  <g transform="translate(256,256) rotate(-30)">
    <!-- Bar -->
    <rect x="-120" y="-10" width="240" height="20" rx="6" fill="#45e6a0"/>
    <!-- Left outer plate -->
    <rect x="-160" y="-60" width="24" height="120" rx="8" fill="#45e6a0"/>
    <!-- Left inner plate -->
    <rect x="-132" y="-45" width="20" height="90" rx="6" fill="#3dd192"/>
    <!-- Right outer plate -->
    <rect x="136" y="-60" width="24" height="120" rx="8" fill="#45e6a0"/>
    <!-- Right inner plate -->
    <rect x="112" y="-45" width="20" height="90" rx="6" fill="#3dd192"/>
  </g>
</svg>